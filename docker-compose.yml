services:
  # MongoDB Database
  mongodb:
    image: mongo:8
    container_name: task-manager-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
      MONGO_INITDB_DATABASE: taskdb
    volumes:
      - mongodb_data:/data/db
    networks:
      - task-manager-network

  # Backend API
  backend:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: task-manager-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGODB_URI: mongodb://admin:adminpassword@mongodb:27017/taskdb?authSource=admin
      JWT_SECRET: 4d9c2e8a7b1f5g6h9j3k7m2n8p4q6r1s5t8u0v3w9x2y6z1A4B7C9D2E5F8G
      FRONTEND_URL: http://localhost:5173
    depends_on:
      - mongodb
    networks:
      - task-manager-network

  backend-test:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: test
    container_name: task-manager-backend-test
    environment:
      PORT: 3000
      MONGODB_URI: mongodb://admin:adminpassword@mongodb:27017/taskdb_test?authSource=admin
      JWT_SECRET: test-jwt-secret-for-ci-cd
      NODE_ENV: test
    depends_on:
      - mongodb
    networks:
      - task-manager-network

  # Frontend (served via nginx)
  frontend:
    build:
      context: ./client
      args:
        - VITE_API_URL=/api
      dockerfile: Dockerfile
    container_name: task-manager-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - task-manager-network

volumes:
  mongodb_data:

networks:
  task-manager-network:
    driver: bridge
