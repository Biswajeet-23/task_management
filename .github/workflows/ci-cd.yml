name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend-e2e-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Run Backend E2E Tests
        run: |
          docker compose -f docker-compose.yml up --build backend-test --abort-on-container-exit

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.yml down --volumes

  backend:
    runs-on: ubuntu-latest
    needs: [backend-e2e-test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: "npm"
          cache-dependency-path: api/package-lock.json

      - name: Install API dependencies
        working-directory: ./api
        run: npm ci

      # Skip tests for now - need to fix dependency injection in test modules
      # - name: Run API tests
      #   working-directory: ./api
      #   run: npm test

      - name: Build API
        working-directory: ./api
        run: npm run build

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: ./client
        run: npm ci

      # Skip tests - client has no test script
      # - name: Run client tests
      #   working-directory: ./client
      #   run: npm test

      - name: Build client
        working-directory: ./client
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker images
        run: docker compose -f docker-compose.yml build

  deploy:
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Deploy to production
        run: |
          echo "Add deployment commands here"
